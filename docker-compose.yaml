services:
  fcc-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fcc-consolidated
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - IMGUR_CLIENT_ID=${IMGUR_CLIENT_ID}
      - BASE_URL=${BASE_URL:-https://fcc.jace.pro/api/urlshortener/}
      - SQLITE_PATH=/app/data/fcc.db
    volumes:
      - fcc-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # Traefik service definition - tells proxy which port to use
      - "traefik.http.services.fcc-dashboard.loadbalancer.server.port=3000"

volumes:
  fcc-data:
    driver: local
