services:
  fcc-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fcc-consolidated
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      # Required for image search API (Imgur)
      - IMGUR_CLIENT_ID=${IMGUR_CLIENT_ID}
      # Base URL for short links (must end with trailing slash)
      - BASE_URL=${BASE_URL:-https://fcc.yourdomain.com/api/urlshortener/}
      # SQLite database path (persisted in volume)
      - SQLITE_PATH=/app/data/fcc.db
    volumes:
      - fcc-data:/app/data
    networks:
      - fcc-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  fcc-data:
    driver: local

networks:
  fcc-network:
    driver: bridge
